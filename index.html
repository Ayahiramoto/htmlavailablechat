<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Kosugi Maru', sans-serif;
  background:#f7f7f7;
}

.topbar {
  background:#ffab19;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ログインボックス */
#loginBox {
  display:none;
  position:absolute;
  top:50px;
  right:10px;
  background:white;
  padding:10px;
  border-radius:8px;
  width:150px;
}

.container {
  max-width:600px;
  margin:20px auto;
}

/* 入力大きく */
textarea {
  width:100%;
  height:100px;
  font-size:14px;
}

/* 投稿 */
.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.time {
  font-size:12px;
  color:gray;
}

#toast {
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px;
  opacity:0;
  transition:1s;
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>

  <div>
    <span id="userText"></span>
    <button onclick="toggleLogin()">サインイン/登録</button>
    <button onclick="logout()" id="logoutBtn" style="display:none;">ログアウト</button>
  </div>
</div>

<!-- ログインボックス -->
<div id="loginBox">
  <input id="username" placeholder="ユーザー名"><br>
  <input id="password" type="password" placeholder="パスワード"><br>
  <button onclick="login()">OK</button>
</div>

<div class="container">

<textarea id="msg" maxlength="150" placeholder="メッセージを入力"></textarea>
<br>
<button onclick="post()">送信</button>

<div id="posts"></div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, deleteDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥ここを自分のにする */
const firebaseConfig = {
  apiKey: "AIzaSyCAX28P2QGaNNp6xytLsE9hhcVher9TgPY",
  authDomain: "scratch-sns.firebaseapp.com",
  projectId: "scratch-sns",
  storageBucket: "scratch-sns.firebasestorage.app",
  messagingSenderId: "414045447005",
  appId: "1:414045447005:web:f4710d0a90a43745fcbeb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");

/* UI更新 */
function updateUI(){
  document.getElementById("userText").textContent = currentUser ? currentUser : "";
  document.getElementById("logoutBtn").style.display = currentUser ? "inline" : "none";
}
updateUI();

/* ログインボックス表示 */
window.toggleLogin = ()=>{
  const box=document.getElementById("loginBox");
  box.style.display = box.style.display==="none" ? "block" : "none";
};

/* 通知 */
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1500);
}

/* ログイン */
window.login = async ()=>{
  const name=username.value;
  const pass=password.value;

  if(!name||!pass){
    toast("入力してください。");
    return;
  }

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{username:name,password:pass});
    toast("登録しました。");
  }else{
    let ok=false;
    snap.forEach(d=>{
      if(d.data().password===pass) ok=true;
    });
    if(!ok){
      toast("パスワードが違います。");
      return;
    }
    toast("ログインしました。");
  }

  currentUser=name;
  localStorage.setItem("username",name);
  updateUI();
};

/* ログアウト */
window.logout = ()=>{
  localStorage.removeItem("username");
  location.reload();
};

/* 時間 */
function formatTime(t){
  return new Date(t).toLocaleString();
}

/* 投稿 */
window.post = async ()=>{
  const text=msg.value;

  if(!currentUser){
    toast("サインインしてください。");
    return;
  }

  if(!text){
    toast("文字を入力してください。");
    return;
  }

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:text,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
};

/* いいね */
window.like = async(id)=>{
  const ref=doc(db,"posts",id);
  const snap=await getDoc(ref);
  let likes=snap.data().likes||[];

  if(likes.includes(currentUser)){
    likes=likes.filter(u=>u!==currentUser);
  }else{
    likes.push(currentUser);
  }

  await updateDoc(ref,{likes});
};

/* 削除 */
window.del = async(id)=>{
  await deleteDoc(doc(db,"posts",id));
};

/* 表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  posts.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const id=d.id;

    const liked=data.likes?.includes(currentUser);

    posts.innerHTML+=`
      <div class="comment">
        <b>${data.name}</b>
        <div class="time">${formatTime(data.time)}</div>
        ${data.message}<br>

        👍 ${data.likes?.length||0}
        <button onclick="like('${id}')">
          ${liked?"いいね解除":"いいね"}
        </button>

        ${currentUser===data.name ? `<button onclick="del('${id}')">削除</button>`:""}
      </div>
    `;
  });
});
</script>

</body>
</html>
