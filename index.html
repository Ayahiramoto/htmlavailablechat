<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Kosugi Maru', sans-serif;
  background:#f7f7f7;
}

.topbar {
  background:#ffab19;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

button { cursor:pointer; }

/* ログインボックス */
#loginBox {
  display:none;
  position:absolute;
  top:60px;
  right:10px;
  background:white;
  padding:15px;
  border-radius:10px;
  width:180px;

  display:flex;
  flex-direction:column;
  gap:8px;

  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

#loginBox input {
  width:100%;
  padding:6px;
  border:1px solid #ccc;
  border-radius:5px;
}

#loginBox button {
  padding:6px;
  background:#ffab19;
  border:none;
  border-radius:5px;
}

/* メイン */
.container {
  max-width:650px;
  margin:20px auto;
}

.post-box {
  background:white;
  padding:10px;
  border-radius:10px;
}

textarea {
  width:100%;
  height:100px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* 投稿 */
.comment {
  background:white;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

.time {
  font-size:12px;
  color:gray;
}

/* 通知 */
#toast {
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:12px 20px;
  border-radius:8px;
  opacity:0;
  transition:0.5s;
  z-index:999;
}

/* 管理者パネル */
#adminPanel {
  display:none;
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:10px;
  width:300px;
  max-height:300px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>

  <div>
    <span id="userText"></span>

    <button id="loginBtn" onclick="toggleLogin()">サインイン/登録</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">ログアウト</button>
    <button id="adminBtn" onclick="openAdmin()" style="display:none;">管理者パネル</button>
  </div>
</div>


<div id="adminPanel">
  <b>管理者パネル</b>
  <div id="userList"></div>
</div>

<div class="container">

<div class="post-box">
  <input type="text" id="name" placeholder="名前">
  <textarea id="message" maxlength="150" placeholder="メッセージを入力"></textarea>
<br>
<button onclick="postMessage()">送信</button>
</div>

<div id="posts"></div>

</div>

<div id="toast"></div>

<script>
const url = "https://evtrxvuhecvhmyvcuvrc.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2dHJ4dnVoZWN2aG15dmN1dnJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzY0NjcsImV4cCI6MjA5MTIxMjQ2N30.SaHGvHObwAe_2uAvMXP5rJH-eHgTemsaJ4wIBqkhjXQ";

/* 投稿 */
async function postMessage(){
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if(!name || !message){
    alert("入力しろ");
    return;
  }

  await fetch(`${url}/rest/v1/posts`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      apikey:KEY,
      Authorization:`Bearer ${KEY}`
    },
    body:JSON.stringify({
      name:name,
      message:message,
      created_at:new Date().toISOString()
    })
  });

  document.getElementById("message").value="";
  loadPosts();
}

/* 投稿取得 */
async function loadPosts(){
  const res = await fetch(
    `${url}/rest/v1/posts?select=*&order=created_at.desc`,
    {
      headers:{
        apikey:KEY,
        Authorization:`Bearer ${KEY}`
      }
    }
  );

  const data = await res.json();

  const posts = document.getElementById("posts");
  posts.innerHTML = "";

  data.forEach(p=>{
    posts.innerHTML += `
      <div class="comment">
        <b>${p.name}</b><br>
        ${p.message}
      </div>
    `;
  });
}

document.addEventListener("DOMContentLoaded",loadPosts);
</script>
</body>
</html>
