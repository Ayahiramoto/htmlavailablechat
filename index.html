<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<style>
body { font-family:sans-serif; background:#f9f9f9; margin:20px;}
.topbar { display:flex; justify-content:space-between; align-items:center;}
button { margin:3px; }
.box { background:white; padding:10px; margin-top:10px; border-radius:10px;}
.comment-box { background:white; padding:10px; margin-top:10px; border-radius:10px;}
.avatar { width:30px; height:30px; border-radius:50%; }
#toast { position:fixed; top:20px; right:20px; background:black; color:white; padding:10px; opacity:0; transition:1s;}
</style>
</head>

<body>

<div class="topbar">
  <h2>雑談所</h2>
  <div id="authArea"></div>
</div>

<!-- 🔐 ログインフォーム -->
<div id="authBox" class="box" style="display:none;">
  <input id="authName" placeholder="ユーザー名"><br><br>
  <input id="authPass" type="password" placeholder="パスワード"><br><br>
  <button id="authBtn"></button>
</div>

<textarea id="message" placeholder="メッセージを入力"></textarea><br>
<button onclick="post()">送信</button>

<div id="posts"></div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"scratch-sns.firebaseapp.com",
  projectId:"scratch-sns"
});

const db=getFirestore(app);
const auth=getAuth(app);

let mode="login";
let currentUser=null;

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1000);
}

// UI更新
function updateUI(){
  const area=document.getElementById("authArea");

  if(!currentUser){
    area.innerHTML=`
      <button onclick="showRegister()">アカウント登録</button>
      <button onclick="showLogin()">サインイン</button>
    `;
  }else{
    area.innerHTML=`
      <button onclick="changeName()">名前変更</button>
      <button onclick="logout()">ログアウト</button>
    `;
  }
}

// フォーム表示
window.showLogin=()=>{
  mode="login";
  document.getElementById("authBox").style.display="block";
  document.getElementById("authBtn").textContent="サインイン";
};

window.showRegister=()=>{
  mode="register";
  document.getElementById("authBox").style.display="block";
  document.getElementById("authBtn").textContent="登録";
};

// 実行
document.getElementById("authBtn").onclick=async()=>{
  const name=document.getElementById("authName").value;
  const pass=document.getElementById("authPass").value;

  const email=name+"@example.com";

  try{
    if(mode==="register"){
      const res=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(res.user,{displayName:name});
      toast("登録成功");
    }else{
      await signInWithEmailAndPassword(auth,email,pass);
      toast("ログイン成功");
    }
  }catch{
    toast("失敗");
  }
};

// ログアウト
window.logout=()=>signOut(auth);

// 名前変更
window.changeName=async()=>{
  const n=prompt("新しい名前");
  if(!n)return;
  await updateProfile(auth.currentUser,{displayName:n});
  toast("変更");
};

// 状態監視
onAuthStateChanged(auth,u=>{
  currentUser=u;
  updateUI();
});

// 投稿
window.post=async()=>{
  const msg=document.getElementById("message").value;
  if(!currentUser){ toast("ログインして"); return;}
  if(!msg){ toast("入力して"); return;}

  await addDoc(collection(db,"posts"),{
    name:currentUser.displayName,
    message:msg,
    time:Date.now()
  });

  document.getElementById("message").value="";
};

// 表示
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  const div=document.getElementById("posts");
  div.innerHTML="";
  snap.forEach(d=>{
    const data=d.data();
    div.innerHTML+=`
      <div class="comment-box">
        <div><b>${data.name}</b></div>
        <div>${data.message}</div>
      </div>
    `;
  });
});
</script>

</body>
</html>
